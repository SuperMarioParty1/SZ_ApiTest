[pytest]
# 测试用例路径
testpaths = testcases
# 测试文件匹配规则
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
# 日志配置
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
# 默认参数：详细输出
addopts = -v --tb=short
